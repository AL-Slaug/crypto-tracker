<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/style.scss" />
    <title>CryptoTracker | Live Market Prices</title>
  </head>
  <body>
    <div id="app" class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header__inner">
            <div class="header-logo">
              <a class="header-logo__link" href="#">
                <img src="./src/assets/svgicons/cripto-icon.svg" alt="" />
                <span>Crypto Tracker</span>
              </a>
            </div>
            <nav class="header-nav">
              <ul class="header-nav__list">
                <li class="header-nav__item">
                  <a class="header-nav__link" href="">Market</a>
                </li>
                <li class="header-nav__item">
                  <a class="header-nav__link" href="">Exchanges</a>
                </li>
                <li class="header-nav__item">
                  <a class="header-nav__link" href="">About</a>
                </li>
              </ul>
            </nav>
            <div class="header-login-search">
              <form class="search-form">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="search-icon"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input
                  id="search"
                  class="search-input"
                  type="search"
                  placeholder="Search coins..."
                />
              </form>
              <a class="login-in" href="#">
                <img src="./src/assets/svgicons/User-Login-icon.svg" alt="" />
              </a>
            </div>
          </div>
        </div>
      </header>
      <main class="page-main">
        <div class="container">
          <div class="page-main__head">
            <h1 class="page-main__title">The Future of Crypto Tracking</h1>
            <p class="page-main__subtitle">
              Stay ahead of the market with real-time data, advanced analytics,
              and portfolio insights.
            </p>
            <div class="page-main__action">
              <button class="page-main__btn page-main__btn--primary">
                Get Started
              </button>
              <button class="page-main__btn page-main__btn--outline">
                View Markets
              </button>
            </div>
          </div>
          <section class="hero-section">
            <div class="hero-section__tracker">
              <div class="tracker-header">
                <div class="tracker-header__col rank">#</div>
                <div class="tracker-header__col name">Name</div>
                <div class="tracker-header__col price">Price</div>
                <div class="tracker-header__col hour">1h %</div>
                <div class="tracker-header__col day">24h %</div>
                <div class="tracker-header__col market-cap">Market Cap</div>
                <div class="tracker-header__col volume">Volume</div>
                <div class="tracker-header__col chart">Last 7 Days</div>
              </div>
              <div class="tracker-body">
                <div class="tracker-row">
                  <div class="tracker-body__row rank">1</div>
                  <div class="tracker-body__row name">Bitcoin</div>
                  <div class="tracker-body__row price">232648</div>
                  <div class="tracker-body__row hour">249084</div>
                  <div class="tracker-body__row day">3489759</div>
                  <div class="tracker-body__row market-cap">335535</div>
                  <div class="tracker-body__row volume">345354</div>
                  <div class="tracker-body__row chart">435456354</div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
