<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/style.scss" />
    <title>CryptoTracker | Live Market Prices</title>
  </head>
  <body>
    <div id="app" class="wrapper">
      <div class="header">
        <div class="container">
          <div class="header__inner">
            <div class="header-logo">
              <a class="header-logo__link" href="#">
                <img src="./src/assets/svgicons/cripto-icon.svg" alt="" />
                <span>Crypto Tracker</span>
              </a>
            </div>
            <nav class="header-nav">
              <ul class="header-nav__list">
                <li class="header-nav__items">
                  <a class="header-nav__link" href="">Market</a>
                </li>
                <li class="header-nav__items">
                  <a class="header-nav__link" href="">Exchanges</a>
                </li>
                <li class="header-nav__items">
                  <a class="header-nav__link" href="">About</a>
                </li>
              </ul>
            </nav>
            <div class="header-login-serch">
              <form class="search-form">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input id="search" class="search-input" type="search" placeholder="Search coins...">
              </form>
              <a class="login-in" href="#">
                <img src="./src/assets/svgicons/User Login icon.svg" alt="">
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
